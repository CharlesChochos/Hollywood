name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-type-check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build
        env:
          DATABASE_URL: postgresql://hollywood:hollywood@localhost:5432/hollywood
          REDIS_URL: redis://localhost:6379
          AUTH_SECRET: ci-test-secret

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-type-check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
        env:
          NODE_ENV: test

  db-migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: lint-type-check
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hollywood
          POSTGRES_USER: hollywood
          POSTGRES_PASSWORD: hollywood
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://hollywood:hollywood@localhost:5432/hollywood

      - name: Run seed
        run: pnpm db:seed
        env:
          DATABASE_URL: postgresql://hollywood:hollywood@localhost:5432/hollywood
